<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuck You as a Service</title>
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <div class="max-w-2xl mx-auto">
            <!-- Header -->
            <div class="text-center mb-8">
                <h1 class="text-4xl font-bold text-gray-800 mb-4">🖕 Fuck You as a Service</h1>
                <p class="text-lg text-gray-600">Send a fuck you</p>
            </div>

            <!-- Main Card -->
            <div class="card text-center">
                <div class="mb-6">
                    <button id="generateBtn" class="btn-primary text-lg px-8 py-3">
                        🎲 Get a Fuck You
                    </button>
                </div>

                <!-- Loading State -->
                <div id="loading" class="hidden">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto"></div>
                    <p class="text-gray-600 mt-2">Generating your meme link...</p>
                </div>

                <!-- Result -->
                <div id="result" class="hidden">
                    <div class="bg-green-50 border border-green-200 rounded-lg p-4 mb-4">
                        <h3 class="text-lg font-semibold text-green-800 mb-2">🎉 your fuck you is here!</h3>
                        <div class="flex items-center justify-center space-x-2">
                            <input id="generatedLink" type="text" readonly 
                                   class="flex-1 px-3 py-2 border border-gray-300 rounded-md bg-white text-sm">
                            <button id="copyBtn" class="copy-button">
                                📋 Copy
                            </button>
                        </div>
                        <p class="text-sm text-green-700 mt-2">Tell them how you really feel!</p>
                    </div>
                    
                    <!-- Preview -->
                    <div id="preview" class="mt-4">
                        <h4 class="text-md font-semibold text-gray-700 mb-2">Preview:</h4>
                        <img id="previewImage" src="" alt="Meme preview" 
                             class="max-w-full h-auto rounded-lg shadow-md mx-auto" style="max-height: 300px;">
                    </div>
                </div>


            </div>

            <!-- Footer -->
            <div class="text-center mt-8 text-gray-500 text-sm">
                <p>Because friends don't let friends live fuck you free</p>
            </div>
        </div>
    </div>

    <script src="/js/main.js"></script>
</body>
</html>
